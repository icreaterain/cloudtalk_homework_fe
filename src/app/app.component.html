<div class="min-h-screen flex flex-col bg-gray-50">
  <!-- Navigation -->
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <!-- Logo + primary nav -->
        <div class="flex items-center gap-8">
          <a
            routerLink="/products"
            class="flex items-center gap-2 text-primary-600 font-bold text-xl"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="28"
              height="28"
              class="h-7 w-7 shrink-0"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
              />
            </svg>
            ReviewHub
          </a>
          <a
            routerLink="/products"
            routerLinkActive="text-primary-600 font-semibold"
            class="text-gray-600 hover:text-gray-900 text-sm font-medium transition-colors"
          >
            Products
          </a>
          @if (authService.isLoggedIn()) {
            <a
              routerLink="/my-reviews"
              routerLinkActive="text-primary-600 font-semibold"
              class="text-gray-600 hover:text-gray-900 text-sm font-medium transition-colors"
            >
              My Reviews
            </a>
          }
        </div>

        <!-- Auth actions -->
        <div class="flex items-center gap-3">
          @if (authService.isLoggedIn()) {
            <span class="text-sm text-gray-500">
              {{ authService.currentUser()?.displayName }}
            </span>
            <button (click)="logout()" class="btn-secondary text-sm">Sign out</button>
          } @else {
            <a routerLink="/auth/login" class="btn-secondary text-sm">Sign in</a>
            <a routerLink="/auth/register" class="btn-primary text-sm">Register</a>
          }
        </div>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1">
    <router-outlet />
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-400">
      ReviewHub &copy; {{ currentYear }} — Product Reviews System
    </div>
  </footer>
</div>
